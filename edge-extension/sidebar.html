<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 书籍简介文字处理工具</title>
    <meta name="version" content="v2.1.0 | 2026-06-24">
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #282840;
            --surface2: #313150;
            --border: #3e3e5c;
            --text: #cdd6f4;
            --text-secondary: #a6adc8;
            --accent: #89b4fa;
            --accent2: #a6e3a1;
            --danger: #f38ba8;
            --on-accent: #1e1e2e;
            --code-bg: #181825;
            --placeholder: #585b70;
            --transition: 0.22s ease;
            --shadow: 0 4px 16px rgba(0,0,0,0.5);
        }
        [data-theme="light"] {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface2: #eef0f4;
            --border: #d0d2d8;
            --text: #1e1e2a;
            --text-secondary: #5a5a6e;
            --accent: #3b6ef0;
            --accent2: #2e9e5c;
            --danger: #d63a4a;
            --on-accent: #ffffff;
            --code-bg: #f0f1f4;
            --placeholder: #989aae;
            --shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ===== 顶部工具栏 ===== */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .toolbar-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            margin-right: 4px;
        }
        .toolbar-title small { font-size: 10px; font-weight: 400; color: var(--text-secondary); }
        .spacer { flex: 1; }
        .btn {
            padding: 4px 9px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
            transition: all var(--transition);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-family: inherit;
        }
        .btn:hover { background: var(--border); border-color: var(--accent); }
        .btn.primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
        .btn.primary:hover { opacity: 0.85; }
        .btn.danger { background: transparent; border-color: var(--danger); color: var(--danger); }
        .btn.danger:hover { background: var(--danger); color: var(--on-accent); }
        .sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
        select.btn { cursor: pointer; }

        /* ===== 操作按钮行 ===== */
        .action-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        /* ===== 设置面板 ===== */
        .settings-panel {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
            max-height: 42vh;
            overflow-y: auto;
        }
        .settings-panel.open { display: flex; }
        .settings-row { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; }
        .settings-panel label {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .settings-panel input[type="range"] { width: 65px; accent-color: var(--accent); }
        .settings-panel input[type="color"] { width: 26px; height: 20px; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; background: transparent; padding: 0; }
        .sdiv { height: 1px; background: var(--border); }

        /* 规则区 */
        .rule-group { display: flex; flex-direction: column; gap: 4px; }
        .rule-group-title { font-size: 11px; color: var(--text-secondary); font-weight: 600; }
        .rule-chips { display: flex; flex-wrap: wrap; gap: 4px; }
        .chip {
            display: inline-flex; align-items: center; gap: 3px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 14px; padding: 2px 8px 2px 10px; font-size: 11px;
        }
        .chip .toggle { cursor: pointer; font-size: 11px; }
        .chip .rm { cursor: pointer; color: var(--danger); font-weight: bold; margin-left: 2px; font-size: 12px; }
        .chip .rm:hover { opacity: 0.7; }
        .hit-badge { display: inline-flex; align-items: center; justify-content: center;
            background: var(--accent); color: var(--on-accent); border-radius: 8px;
            font-size: 9px; font-weight: 700; min-width: 16px; height: 16px; padding: 0 4px; }
        .add-form { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-top: 2px; }
        .add-form input, .add-form select {
            padding: 3px 6px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: 4px;
            color: var(--text); font-size: 11px; font-family: inherit;
        }
        .add-form input { width: 88px; }
        .add-form input.wide { width: 115px; }
        .btn-sm {
            padding: 3px 9px; font-size: 11px; border-radius: 4px; cursor: pointer;
            border: 1px solid var(--accent); background: var(--accent); color: var(--on-accent); font-family: inherit;
        }
        .btn-sm:hover { opacity: 0.85; }
        .btn-sm.del { background: var(--danger); border-color: var(--danger); }
        .text-muted { color: var(--placeholder); }

        /* ===== 主区域：上下分栏 ===== */
        .main-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* 输入区 */
        .input-section {
            display: flex;
            flex-direction: column;
            flex: 0 0 40%;
            min-height: 80px;
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            overflow: hidden;
        }
        .section-header {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface2);
            user-select: none;
        }
        .char-count { font-weight: 400; font-size: 10px; }

        .input-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 6px 8px;
            gap: 5px;
        }
        .drop-zone {
            border: 1.5px dashed var(--border);
            border-radius: 5px;
            padding: 5px 8px;
            text-align: center;
            color: var(--placeholder);
            font-size: 11px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .drop-zone.dragover { border-color: var(--accent); background: var(--surface2); }
        .main-textarea {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none; outline: none; resize: none;
            color: var(--text);
            font-size: 13px; line-height: 1.75;
            font-family: inherit;
        }
        .main-textarea::placeholder { color: var(--placeholder); }

        /* 拖拽分割线 */
        .resize-handle {
            height: 5px;
            background: var(--border);
            cursor: ns-resize;
            flex-shrink: 0;
            transition: background var(--transition);
            position: relative;
        }
        .resize-handle:hover { background: var(--accent); }

        /* 预览区 */
        .preview-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 60px;
            background: var(--surface);
            overflow: hidden;
        }
        .preview-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
        }
        .preview-content { font-size: 13px; line-height: 1.75; word-break: break-word; }
        .preview-content p { margin-bottom: 0.8em; }

        /* ===== HTML 代码面板 ===== */
        .code-panel {
            flex-shrink: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .code-panel-header {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .code-panel-header:hover { background: var(--border); }
        .code-area {
            padding: 6px 10px;
            background: var(--code-bg);
            max-height: 120px;
            overflow-y: auto;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 11px;
            line-height: 1.5;
            color: var(--accent2);
            white-space: pre-wrap;
            word-break: break-all;
        }
        .code-panel.collapsed .code-area { display: none; }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface2);
            color: var(--text);
            padding: 7px 20px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ===== 顶部：标题 + 主题 ===== -->
<div class="toolbar">
    <span class="toolbar-title">📚 书籍简介 <small>v2.0.3</small></span>
    <div class="spacer"></div>
    <select id="themeSelect" class="btn">
        <option value="dark">🌙 深色</option>
        <option value="light">☀️ 浅色</option>
        <option value="system">💻 跟随系统</option>
    </select>
    <button class="btn" id="settingsBtn">⚙️ 设置</button>
</div>

<!-- ===== 操作按钮 ===== -->
<div class="action-bar">
    <button class="btn primary" id="copyHtmlBtn" title="复制 HTML（Ctrl+S）">📋 复制HTML</button>
    <button class="btn" id="copyTextBtn">📄 复制文本</button>
    <span class="sep"></span>
    <button class="btn" id="templateBtn">📖 模板</button>
    <button class="btn danger" id="clearBtn">🗑️ 清空</button>
    <span class="sep"></span>
    <button class="btn" id="exportBtn" title="导出规则">📤</button>
    <button class="btn" id="importBtn" title="导入规则">📥</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none">
    <button class="btn" id="sampleBtn" title="加载示例">🔄</button>
</div>

<!-- ===== 设置面板 ===== -->
<div class="settings-panel" id="settingsPanel">
    <div class="settings-row">
        <label>字号 <input type="range" id="previewFontSize" min="12" max="22" value="13"><span id="fontSizeVal">13px</span></label>
        <label>段距 <input type="range" id="paragraphSpacing" min="0" max="2" step="0.1" value="0.8"><span id="spacingVal">0.8em</span></label>
        <label>缩进 <input type="range" id="textIndent" min="0" max="4" step="0.1" value="0"><span id="indentVal">0em</span></label>
        <label>高亮色 <input type="color" id="highlightColor" value="#f9e2af"></label>
    </div>
    <div class="sdiv"></div>
    <div class="rule-group">
        <span class="rule-group-title">🔑 关键词规则</span>
        <div class="rule-chips" id="rulesList"></div>
        <div class="add-form">
            <input type="text" id="newKeyword" placeholder="关键词">
            <select id="newStyle">
                <option value="bold">加粗</option>
                <option value="big">加大</option>
                <option value="bold-big">加粗+大</option>
                <option value="color">高亮</option>
                <option value="italic">斜体</option>
                <option value="underline">下划线</option>
                <option value="custom-color">自定义色</option>
            </select>
            <button class="btn-sm" id="addRuleBtn">+ 添加</button>
            <button class="btn-sm del" id="clearRulesBtn">清空</button>
        </div>
        <div class="add-form" id="kwCustomColorRow" style="display:none;">
            <label style="font-size:11px;color:var(--text-secondary);">自定义颜色</label>
            <input type="color" id="kwCustomColor" value="#e74c3c" style="width:36px;height:24px;padding:0;border:none;cursor:pointer;">
        </div>
    </div>
    <div class="sdiv"></div>
    <div class="rule-group">
        <span class="rule-group-title">🧩 正则规则</span>
        <div class="rule-chips" id="regexRulesList"></div>
        <div class="add-form">
            <input type="text" id="newRegexPattern" placeholder="例如: \d+ 或 第.+章" class="wide">
            <select id="newRegexStyle">
                <option value="bold">加粗</option>
                <option value="big">加大</option>
                <option value="bold-big">加粗+大</option>
                <option value="color">高亮</option>
                <option value="italic">斜体</option>
                <option value="underline">下划线</option>
                <option value="custom-color">自定义色</option>
            </select>
            <button class="btn-sm" id="addRegexBtn">+ 添加</button>
            <button class="btn-sm del" id="clearRegexBtn">清空</button>
        </div>
        <div class="add-form" id="rxCustomColorRow" style="display:none;">
            <label style="font-size:11px;color:var(--text-secondary);">自定义颜色</label>
            <input type="color" id="rxCustomColor" value="#e74c3c" style="width:36px;height:24px;padding:0;border:none;cursor:pointer;">
        </div>
    </div>
</div>

<!-- ===== 主区域：上（输入）+ 下（预览） ===== -->
<div class="main-wrap">
    <!-- 输入区 -->
    <div class="input-section" id="inputSection">
        <div class="section-header">
            <span>📥 输入</span>
            <span class="char-count" id="inputCount">0 字</span>
        </div>
        <div class="input-body">
            <div class="drop-zone" id="dropZone">📂 拖拽 .txt/.md 文件，或点击上传</div>
            <input type="file" id="fileInput" accept=".txt,.md" style="display:none">
            <textarea class="main-textarea" id="inputArea"
                placeholder="在此粘贴或输入文字...&#10;每段之间用空行分隔，会自动添加 &lt;p&gt; 标签"></textarea>
        </div>
    </div>

    <!-- 拖拽分割线 -->
    <div class="resize-handle" id="resizeHandle"></div>

    <!-- 预览区 -->
    <div class="preview-section">
        <div class="section-header">
            <span>👁️ 预览</span>
            <span class="char-count" id="previewCount">0 字</span>
        </div>
        <div class="preview-body">
            <div class="preview-content" id="previewArea">
                <p class="text-muted">处理后的预览将在此显示...</p>
            </div>
        </div>
    </div>
</div>

<!-- ===== HTML 代码面板 ===== -->
<div class="code-panel collapsed" id="codePanel">
    <div class="code-panel-header" id="codePanelHeader">
        <span>💻 HTML 代码</span>
        <span id="codeToggleIcon">▶</span>
    </div>
    <div class="code-area" id="codeArea"><span class="text-muted">HTML 代码将在此显示...</span></div>
</div>

<!-- 所有 JS 逻辑在外部文件，规避扩展 CSP 对内联脚本的限制 -->
<script src="sidebar.js"></script>
</body>
</html>
